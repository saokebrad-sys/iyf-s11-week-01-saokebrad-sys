</head>
<body>

    <header>
        <h1>My Site</h1>

        <nav>
            <ul>
                <li>Home</li>
                <li>About</li>

            </ul>

    <main>

        <aside>

            <p>Recent Posts</p>
        </aside>
    </main>

    <footer>
        <p>&copy; 2026</p>
    </footer>

</body>
