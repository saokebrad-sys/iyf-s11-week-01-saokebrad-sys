<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>
<body>

    <nav>
        <a href="index.html">Home</a> |
        <a href="about.html">About</a> |
        <a href="projects.html">Projects</a> |
        <strong>Contact</strong>
    </nav>

    <h1>Contact Me</h1>

    <p>Location: Nairobi, Kenya</p>
    <p>Timezone: East Africa Time (EAT, UTC+3)</p>

    <h2>Social Media</h2>
    <ul>
        <li><a href="https://github.com/saokebrad-sys">GitHub</a></li>
        <li><a href="https://linkedin.com">LinkedIn</a></li>
        <li><a href="https://instagram.com">Instagram</a></li>
    </ul>

    <form>
        <fieldset>
            <legend>Personal Information</legend>

            <label for="name">Name:</label><br>
            <input type="text" id="name" placeholder="Enter your name" required>
            <br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" placeholder="Enter your email" required>
            <br><br>

            <label for="phone">Phone:</label><br>
            <input type="tel" id="phone" placeholder="Optional">
        </fieldset>

        <br>

        <fieldset>
            <legend>Your Message</legend>

            <label for="subject">Subject:</label><br>
            <select id="subject">
                <option>Question</option>
                <option>Feedback</option>
                <option>Support</option>
            </select>

            <br><br>

            <label for="message">Message:</label><br>
            <textarea id="message" placeholder="Write your message here" minlength="50" required></textarea>

            <br><br>

            <input type="checkbox" id="news">
            <label for="news">Subscribe to newsletter</label>
        </fieldset>

        <br>

        <button type="submit">Send Message</button>
    </form>

</body>
</html>
